<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik Bobasa Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 85px; }
        .tab-content { display: none; padding: 15px; }
        .active-tab { display: block; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { padding: 10px 5px; text-align: center; cursor: pointer; flex: 1; font-size: 0.75rem; color: #666; }
        .nav-item.active { color: #0d6efd; font-weight: bold; border-top: 3px solid #0d6efd; }
        .poop-btn { width: 90px; height: 90px; border-radius: 50%; font-size: 30px; background-color: #795548; border: none; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>

    <div class="bg-primary text-white p-2 sticky-top shadow-sm">
        <select id="globalChildSelect" class="form-select form-select-sm" onchange="refreshAllViews()">
            <option value="">-- Wybierz dziecko --</option>
        </select>
    </div>

    <div id="today" class="tab-content active-tab">
        <div id="summaryCards" class="row g-2 mb-3 text-center"></div>
        <h6 class="border-bottom pb-2">Ostatnie zdarzenia:</h6>
        <ul id="historyList" class="list-group list-group-flush small"></ul>
    </div>

    <div id="meal" class="tab-content">
        <h5>🍼 Nowy Posiłek</h5>
        <div class="card p-3 shadow-sm">
            <input type="datetime-local" id="mealDateTime" class="form-control mb-3">
            <select id="milkType" class="form-select mb-3">
                <option value="Pierś">Karmienie piersią</option>
                <option value="Butelka (Matka)">Mleko matki (butelka)</option>
                <option value="Modyfikowane">Mleko modyfikowane</option>
            </select>
            <div class="input-group mb-3">
                <input type="number" id="mlAmount" class="form-control" placeholder="Ilość ml">
                <span class="input-group-text">ml</span>
            </div>
            <button onclick="saveMeal()" class="btn btn-primary w-100">Zapisz</button>
        </div>
    </div>

    <div id="poop" class="tab-content text-center">
        <h5>💩 Zdarzenie</h5>
        <input type="datetime-local" id="poopDateTime" class="form-control mb-4">
        <button onclick="savePoop()" class="poop-btn">💩</button>
    </div>

    <div id="weight" class="tab-content">
        <h5>⚖️ Pomiary Wagi</h5>
        <div class="card p-3 mb-3 shadow-sm">
            <div class="input-group mb-2">
                <input type="number" id="newWeight" class="form-control" placeholder="Waga w gramach (np. 4250)">
                <span class="input-group-text">g</span>
            </div>
            <input type="date" id="weightDate" class="form-control mb-2">
            <button onclick="saveNewWeight()" class="btn btn-success w-100">Dodaj pomiar</button>
        </div>
        <h6>Historia wagi:</h6>
        <ul id="weightHistoryList" class="list-group small"></ul>
    </div>

    <div id="analytics" class="tab-content">
        <h5>📈 Wykresy</h5>
        <div class="mb-3">
            <label class="small fw-bold">Skala czasu:</label>
            <div class="btn-group btn-group-sm w-100" role="group">
                <input type="radio" class="btn-check" name="timeScale" id="scaleHour" checked>
                <label class="btn btn-outline-secondary" for="scaleHour" onclick="renderFeedingChart('hour')">Dzisiaj (Godziny)</label>
                <input type="radio" class="btn-check" name="timeScale" id="scaleDay">
                <label class="btn btn-outline-secondary" for="scaleDay" onclick="renderFeedingChart('day')">Ostatnie dni</label>
            </div>
        </div>
        <div class="btn-group w-100 mb-3">
            <button class="btn btn-sm btn-primary" onclick="renderFeedingChart()">🍼 Posiłki</button>
            <button class="btn btn-sm btn-success" onclick="renderWeightChart()">⚖️ Waga</button>
        </div>
        <div class="chart-container"><canvas id="myChart"></canvas></div>
    </div>

    <div id="settings" class="tab-content">
        <h5>⚙️ Zarządzaj Dziećmi</h5>
        <div class="card p-3 mb-3 shadow-sm">
            <input type="text" id="childName" class="form-control mb-2" placeholder="Imię">
            <input type="date" id="childBirth" class="form-control mb-2">
            <button onclick="addChild()" class="btn btn-dark w-100">Dodaj profil</button>
        </div>
        <div id="childrenList"></div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="showTab('today')">🏠 Dziś</div>
        <div class="nav-item" onclick="showTab('meal')">🍼 Jemy</div>
        <div class="nav-item" onclick="showTab('poop')">💩 Kupa</div>
        <div class="nav-item" onclick="showTab('weight')">⚖️ Waga</div>
        <div class="nav-item" onclick="showTab('analytics')">📈 Raport</div>
        <div class="nav-item" onclick="showTab('settings')">⚙️ Profil</div>
    </nav>

    <script>
        let db;
        let currentChart = null;

        const request = indexedDB.open("BabyTrackerProDB", 5);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("events")) db.createObjectStore("events", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("children")) db.createObjectStore("children", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("weight_history")) db.createObjectStore("weight_history", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { db = e.target.result; refreshChildrenData(); setCurrentDateTime(); };

        function loadHistory() {
        const selId = getSelectedChild();
        const tx = db.transaction(["events", "children"], "readonly");
        const eventsStore = tx.objectStore("events");
        const childrenStore = tx.objectStore("children");

        eventsStore.getAll().onsuccess = (e) => {
            const events = e.target.result;
            childrenStore.getAll().onsuccess = (e2) => {
                const children = e2.target.result;
                const today = new Date().toDateString();
                
                // Filtrujemy zdarzenia dla wybranego dziecka (jeśli wybrane)
                const filtered = events.filter(ev => !selId || ev.childId === selId);
                
                // Obliczamy sumę ml z dzisiaj
                const dailyTotal = filtered
                    .filter(ev => new Date(ev.date).toDateString() === today && ev.type === 'posiłek')
                    .reduce((s, ev) => s + (parseInt(ev.amount) || 0), 0);
                
                document.getElementById('summaryCards').innerHTML = `
                    <div class="col-12">
                        <div class="card p-2 bg-primary text-white shadow-sm">
                            <small>Dzisiaj zjedzono:</small>
                            <h4 class="mb-0">${dailyTotal} ml</h4>
                        </div>
                    </div>`;

                // Wyświetlamy 15 ostatnich aktywności
                const lastEvents = filtered.slice(-15).reverse();
                document.getElementById('historyList').innerHTML = lastEvents.map(ev => {
                    const cName = children.find(c => c.id === ev.childId)?.name || "Dziecko";
                    const time = new Date(ev.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    return `
                        <li class="list-group-item d-flex justify-content-between align-items-center px-2">
                            <span><strong>${cName}</strong>: ${ev.type === 'kupa' ? '💩 Kupa' : '🍼 ' + ev.milkType}</span>
                            <span class="badge bg-light text-dark border">${ev.amount > 0 ? ev.amount + 'ml | ' : ''}${time}</span>
                        </li>`;
                }).join('');
            };
        };
    }
    function deleteChild(id) {
    if(!confirm("Czy na pewno usunąć profil dziecka i wszystkie jego dane?")) return;
    const tx = db.transaction(["children", "events", "weight_history"], "readwrite");
    tx.objectStore("children").delete(id);
    // Opcjonalnie: tutaj można dodać pętlę usuwającą zdarzenia przypisane do tego dziecka
    tx.oncomplete = () => {
        refreshChildrenData();
        alert("Profil usunięty");
    };
}

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            event.currentTarget.classList.add('active');
            refreshAllViews();
        }

        function refreshAllViews() {
            loadHistory();
            renderChildrenList();
            renderWeightHistory();
            setCurrentDateTime();
        }

        function setCurrentDateTime() {
            const now = new Date().toISOString().slice(0, 16);
            document.getElementById('mealDateTime').value = now;
            document.getElementById('poopDateTime').value = now;
            document.getElementById('weightDate').value = now.slice(0,10);
        }

        function getSelectedChild() {
            const id = document.getElementById('globalChildSelect').value;
            return id ? parseInt(id) : null;
        }

        // --- OBSŁUGA WAGI ---
        function saveNewWeight() {
            const childId = getSelectedChild();
            const weight = parseInt(document.getElementById('newWeight').value);
            const date = document.getElementById('weightDate').value;
            if(!childId || !weight || !date) return alert("Wybierz dziecko i podaj dane!");

            const tx = db.transaction("weight_history", "readwrite");
            tx.objectStore("weight_history").add({ childId, weight, date: new Date(date) });
            tx.oncomplete = () => {
                alert("Waga zapisana!");
                document.getElementById('newWeight').value = "";
                renderWeightHistory();
            };
        }

        function renderWeightHistory() {
            const childId = getSelectedChild();
            if(!childId) return;
            db.transaction("weight_history").objectStore("weight_history").getAll().onsuccess = (e) => {
                const list = document.getElementById('weightHistoryList');
                const history = e.target.result.filter(w => w.childId === childId).reverse();
                list.innerHTML = history.map(w => `
                    <li class="list-group-item d-flex justify-content-between p-1">
                        <span>${new Date(w.date).toLocaleDateString()}</span>
                        <strong>${w.weight} g</strong>
                    </li>
                `).join('');
            };
        }

        // --- WYKRESY Z WYBOREM SKALI ---
        function renderFeedingChart(scale = 'hour') {
            const childId = getSelectedChild();
            if (!childId) return alert("Wybierz dziecko!");
            
            db.transaction("events").objectStore("events").getAll().onsuccess = (e) => {
                const events = e.target.result.filter(ev => ev.childId === childId && ev.type === 'posiłek');
                let labels = [];
                let values = [];

                if(scale === 'hour') {
                    // Grupowanie po godzinach (tylko dzisiaj)
                    const today = new Date().toDateString();
                    const hours = Array.from({length: 24}, (_, i) => i + ":00");
                    const hourlyData = new Array(24).fill(0);
                    
                    events.forEach(ev => {
                        const d = new Date(ev.date);
                        if(d.toDateString() === today) {
                            hourlyData[d.getHours()] += ev.amount;
                        }
                    });
                    labels = hours;
                    values = hourlyData;
                } else {
                    // Grupowanie po dniach (ostatnie 7 dni)
                    const dayMap = {};
                    events.forEach(ev => {
                        const day = new Date(ev.date).toLocaleDateString();
                        dayMap[day] = (dayMap[day] || 0) + ev.amount;
                    });
                    labels = Object.keys(dayMap).slice(-7);
                    values = Object.values(dayMap).slice(-7);
                }

                drawChart('Karmienie (ml)', labels, values, '#0d6efd', scale === 'hour' ? 'bar' : 'line');
            };
        }

        function renderWeightChart() {
            const childId = getSelectedChild();
            if (!childId) return;
            db.transaction("weight_history").objectStore("weight_history").getAll().onsuccess = (e) => {
                const data = e.target.result.filter(w => w.childId === childId).sort((a,b) => new Date(a.date) - new Date(b.date));
                drawChart('Waga (g)', data.map(w => new Date(w.date).toLocaleDateString()), data.map(w => w.weight), '#198754', 'line');
            };
        }

        function drawChart(label, labels, data, color, type) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: type,
                data: { labels: labels, datasets: [{ label: label, data: data, backgroundColor: color+'88', borderColor: color, fill: true, tension: 0.3 }] },
                options: { maintainAspectRatio: false }
            });
        }

        // --- FUNKCJE POMOCNICZE ---
        function refreshChildrenData() {
            db.transaction("children").objectStore("children").getAll().onsuccess = (e) => {
                const select = document.getElementById('globalChildSelect');
                select.innerHTML = '<option value="">-- Wybierz dziecko --</option>' + 
                    e.target.result.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                refreshAllViews();
            };
        }

        function addChild() {
            const name = document.getElementById('childName').value;
            const birth = document.getElementById('childBirth').value;
            if(!name) return;
            const tx = db.transaction("children", "readwrite");
            tx.objectStore("children").add({ name, birth });
            tx.oncomplete = () => { document.getElementById('childName').value = ""; refreshChildrenData(); };
        }

        function renderChildrenList() {
            db.transaction("children").objectStore("children").getAll().onsuccess = (e) => {
                document.getElementById('childrenList').innerHTML = e.target.result.map(c => `
                    <div class="card p-2 mb-2 border-start border-primary border-4 shadow-sm small">
                        <strong>${c.name}</strong> ur. ${c.birth}
                    </div>`).join('');
            };
        }

        function loadHistory() {
            const selId = getSelectedChild();
            db.transaction("events").objectStore("events").getAll().onsuccess = (e) => {
                const today = new Date().toDateString();
                const filtered = e.target.result.filter(ev => !selId || ev.childId === selId);
                const dailyTotal = filtered.filter(ev => new Date(ev.date).toDateString() === today).reduce((s, ev) => s + (ev.amount||0), 0);
                
                document.getElementById('summaryCards').innerHTML = `<div class="col-12"><div class="card p-2 bg-primary text-white">Dzisiaj: ${dailyTotal} ml</div></div>`;
                document.getElementById('historyList').innerHTML = filtered.slice(-10).reverse().map(ev => `
                    <li class="list-group-item d-flex justify-content-between px-1">
                        <span>${ev.type === 'kupa' ? '💩 Kupa' : '🍼 ' + ev.amount + 'ml'}</span>
                        <span class="text-muted">${new Date(ev.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </li>`).join('');
            };
        }
    </script>
</body>
</html>
