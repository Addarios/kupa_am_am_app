<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik Bobasa Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 80px; }
        .tab-content { display: none; padding: 20px; }
        .active-tab { display: block; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { padding: 12px; text-align: center; cursor: pointer; flex: 1; font-size: 0.8rem; }
        .nav-item.active { color: #0d6efd; font-weight: bold; border-top: 3px solid #0d6efd; }
        .poop-btn { width: 100px; height: 100px; border-radius: 50%; font-size: 35px; background-color: #795548; border: none; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="bg-light p-2 border-bottom sticky-top">
        <select id="globalChildSelect" class="form-select" onchange="loadHistory()">
            <option value="">-- Wybierz dziecko --</option>
        </select>
    </div>

    <div id="report" class="tab-content active-tab">
        <div id="summaryCards" class="row g-2 mb-3"></div>
        <h6>Ostatnie aktywności:</h6>
        <ul id="historyList" class="list-group list-group-flush shadow-sm small"></ul>
    </div>

    <div id="meal" class="tab-content">
        <h4>Dodaj Posiłek</h4>
        <div class="card p-3 mt-2 shadow-sm">
            <label class="small fw-bold">Kiedy?</label>
            <input type="datetime-local" id="mealDateTime" class="form-control mb-3">
            
            <label class="small fw-bold">Rodzaj:</label>
            <select id="milkType" class="form-select mb-3">
                <option value="Pierś">Karmienie piersią</option>
                <option value="Butelka (Matka)">Mleko matki (butelka)</option>
                <option value="Modyfikowane">Mleko modyfikowane</option>
            </select>
            
            <label class="small fw-bold">Ilość (ml):</label>
            <input type="number" id="mlAmount" class="form-control mb-4" placeholder="Np. 120">
            
            <button onclick="saveMeal()" class="btn btn-primary w-100 py-3">Zapisz Posiłek</button>
        </div>
    </div>

    <div id="poop" class="tab-content text-center">
        <h4 class="mb-5">Zanotuj kupę</h4>
        <input type="datetime-local" id="poopDateTime" class="form-control mb-4 mx-auto" style="max-width: 300px;">
        <button onclick="savePoop()" class="poop-btn">💩</button>
    </div>

    <div id="analytics" class="tab-content">
        <h4 class="text-center">Wykresy</h4>
        <div class="btn-group w-100 mb-3">
            <button class="btn btn-sm btn-outline-primary" onclick="renderFeedingChart()">🍼 Karmienie</button>
            <button class="btn btn-sm btn-outline-success" onclick="renderWeightChart()">⚖️ Waga</button>
        </div>
        <div class="card p-1 shadow-sm"><canvas id="myChart"></canvas></div>
    </div>

    <div id="settings" class="tab-content">
        <h4>Profil i Waga</h4>
        <div class="card p-3 shadow-sm mb-4">
            <input type="text" id="childName" class="form-control mb-2" placeholder="Imię">
            <input type="date" id="childBirth" class="form-control mb-2">
            <select id="childGender" class="form-select mb-3">
                <option value="Chłopiec">Chłopiec</option>
                <option value="Dziewczynka">Dziewczynka</option>
            </select>
            <button onclick="addChild()" class="btn btn-success w-100 mb-2">Dodaj dziecko</button>
            <hr>
            <h6>Zapisz wagę (g):</h6>
            <div class="input-group">
                <input type="number" id="newWeight" class="form-control" placeholder="Np. 4100">
                <button class="btn btn-primary" onclick="saveNewWeight()">Zapisz wagę</button>
            </div>
        </div>
        <div id="childrenList" class="row g-2"></div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="showTab('report')">📊 Dziś</div>
        <div class="nav-item" onclick="showTab('meal')">🍼 Posiłek</div>
        <div class="nav-item" onclick="showTab('poop')">💩 Kupa</div>
        <div class="nav-item" onclick="showTab('analytics')">📈 Wykresy</div>
        <div class="nav-item" onclick="showTab('settings')">⚙️ Profil</div>
    </nav>

    <script>
        let db;
        let currentChart = null;

        const request = indexedDB.open("BabyTrackerProDB", 4);

        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("events")) db.createObjectStore("events", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("children")) db.createObjectStore("children", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("weight_history")) db.createObjectStore("weight_history", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = e => {
            db = e.target.result;
            setCurrentDateTime();
            refreshChildrenData();
        };

        function setCurrentDateTime() {
            const now = new Date().toISOString().slice(0, 16);
            document.getElementById('mealDateTime').value = now;
            document.getElementById('poopDateTime').value = now;
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            event.currentTarget.classList.add('active');
            if(id === 'report') loadHistory();
            if(id === 'settings') renderChildrenList();
            setCurrentDateTime();
        }

        function saveMeal() {
            const childId = getSelectedChild();
            const date = document.getElementById('mealDateTime').value;
            if(!childId || !date) return alert("Wybierz dziecko i datę!");
            const milk = document.getElementById('milkType').value;
            const ml = parseInt(document.getElementById('mlAmount').value) || 0;

            const tx = db.transaction("events", "readwrite");
            tx.objectStore("events").add({ childId, type: 'posiłek', milkType: milk, amount: ml, date: new Date(date) });
            tx.oncomplete = () => { alert("Zapisano!"); showTab('report'); };
        }

        function savePoop() {
            const childId = getSelectedChild();
            const date = document.getElementById('poopDateTime').value;
            if(!childId) return alert("Wybierz dziecko!");
            const tx = db.transaction("events", "readwrite");
            tx.objectStore("events").add({ childId, type: 'kupa', amount: 0, date: new Date(date) });
            tx.oncomplete = () => { alert("Zapisano!"); showTab('report'); };
        }

        function saveNewWeight() {
            const childId = getSelectedChild();
            const weight = parseInt(document.getElementById('newWeight').value);
            if(!childId || !weight) return alert("Wybierz dziecko i podaj wagę!");

            const tx = db.transaction("weight_history", "readwrite");
            tx.objectStore("weight_history").add({ childId, weight, date: new Date() });
            tx.oncomplete = () => {
                alert("Waga zapisana!");
                document.getElementById('newWeight').value = "";
                renderChildrenList();
            };
        }

        function renderFeedingChart() {
            const childId = getSelectedChild();
            if (!childId) return;
            db.transaction("events").objectStore("events").getAll().onsuccess = (e) => {
                const data = e.target.result.filter(ev => ev.childId === childId && ev.type === 'posiłek');
                const groups = {};
                data.forEach(ev => {
                    const day = new Date(ev.date).toLocaleDateString();
                    groups[day] = (groups[day] || 0) + ev.amount;
                });
                drawChart('Karmienie (ml)', Object.keys(groups), Object.values(groups), '#0d6efd');
            };
        }

        function renderWeightChart() {
            const childId = getSelectedChild();
            if (!childId) return;
            db.transaction("weight_history").objectStore("weight_history").getAll().onsuccess = (e) => {
                const data = e.target.result.filter(w => w.childId === childId);
                data.sort((a,b) => new Date(a.date) - new Date(b.date));
                const labels = data.map(w => new Date(w.date).toLocaleDateString());
                const values = data.map(w => w.weight);
                drawChart('Masa ciała (g)', labels, values, '#198754');
            };
        }

        function drawChart(label, labels, data, color) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: label, data: data, borderColor: color, tension: 0.3, fill: true, backgroundColor: color+'22' }] }
            });
        }

        // --- RESZTA LOGIKI (refreshChildrenData, getSelectedChild, loadHistory itp.) ---
        // (Pozostaje taka sama jak w poprzednim kroku)
        
        function getSelectedChild() {
            const id = document.getElementById('globalChildSelect').value;
            return id ? parseInt(id) : null;
        }

        function refreshChildrenData() {
            db.transaction("children").objectStore("children").getAll().onsuccess = (e) => {
                const select = document.getElementById('globalChildSelect');
                const current = select.value;
                select.innerHTML = '<option value="">-- Wybierz dziecko --</option>';
                e.target.result.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
                select.value = current;
                loadHistory();
            };
        }

        function addChild() {
            const name = document.getElementById('childName').value;
            const birth = document.getElementById('childBirth').value;
            const gender = document.getElementById('childGender').value;
            if(!name || !birth) return alert("Uzupełnij dane!");
            const tx = db.transaction("children", "readwrite");
            tx.objectStore("children").add({ name, birth, gender });
            tx.oncomplete = () => { refreshChildrenData(); renderChildrenList(); };
        }

        function renderChildrenList() {
            db.transaction(["children", "weight_history"]).objectStore("children").getAll().onsuccess = (e) => {
                const list = document.getElementById('childrenList');
                list.innerHTML = e.target.result.map(c => `
                    <div class="col-12 card p-2 mb-2 shadow-sm">
                        <div class="fw-bold">${c.name}</div>
                        <div class="small text-muted">Ur. ${c.birth} | ${c.gender}</div>
                    </div>
                `).join('');
            };
        }

        function loadHistory() {
            const selId = getSelectedChild();
            const tx = db.transaction(["events", "children"], "readonly");
            tx.objectStore("events").getAll().onsuccess = (e) => {
                const events = e.target.result;
                const today = new Date().toDateString();
                const filtered = events.filter(ev => !selId || ev.childId === selId).reverse();
                
                document.getElementById('historyList').innerHTML = filtered.map(ev => `
                    <li class="list-group-item d-flex justify-content-between">
                        <span>${ev.type === 'kupa' ? '💩' : '🍼'} ${ev.milkType || ''}</span>
                        <small>${ev.amount ? ev.amount+'ml' : ''} | ${new Date(ev.date).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</small>
                    </li>
                `).join('');
            };
        }
    </script>
</body>
</html>
