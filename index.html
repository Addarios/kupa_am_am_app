<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik Bobasa Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="bg-primary text-white p-2 sticky-top shadow-sm">
        <select id="globalChildSelect" class="form-select form-select-sm shadow-none">
            <option value="">-- Wybierz dziecko --</option>
        </select>
    </div>

    <div id="today" class="tab-content active-tab">
        <div id="summaryCards" class="row g-2 mb-3 text-center"></div>
        <h6 class="border-bottom pb-2">Ostatnie zdarzenia:</h6>
        <ul id="historyList" class="list-group list-group-flush small"></ul>
    </div>

    <div id="meal" class="tab-content">
        <h5>🍼 Nowy Posiłek</h5>
        <div class="card p-3 shadow-sm">
            <input type="datetime-local" id="mealDateTime" class="form-control mb-3">
            <select id="milkType" class="form-select mb-3">
                <option value="Pierś">Karmienie piersią</option>
                <option value="Butelka (Matka)">Mleko matki (butelka)</option>
                <option value="Modyfikowane">Mleko modyfikowane</option>
            </select>
            <div class="input-group mb-3">
                <input type="number" id="mlAmount" class="form-control" placeholder="Ilość ml">
                <span class="input-group-text">ml</span>
            </div>
            <button id="btnSaveMeal" class="btn btn-primary w-100">Zapisz</button>
        </div>
    </div>

    <div id="poop" class="tab-content text-center">
        <h5>💩 Zdarzenie</h5>
        <input type="datetime-local" id="poopDateTime" class="form-control mb-4">
        <button id="btnSavePoop" class="poop-btn">💩</button>
    </div>

    <div id="weight" class="tab-content">
        <h5>⚖️ Pomiary Wagi</h5>
        <div class="card p-3 mb-3 shadow-sm">
            <div class="input-group mb-2">
                <input type="number" id="newWeight" class="form-control" placeholder="Waga w gramach">
                <span class="input-group-text">g</span>
            </div>
            <input type="date" id="weightDate" class="form-control mb-2">
            <button id="btnSaveWeight" class="btn btn-success w-100">Dodaj pomiar</button>
        </div>
        <ul id="weightHistoryList" class="list-group small"></ul>
    </div>

    <div id="analytics" class="tab-content">
        <h5>📈 Wykresy</h5>
        <div class="btn-group btn-group-sm w-100 mb-3">
            <button class="btn btn-outline-secondary" id="btnScaleHour">Dziś (h)</button>
            <button class="btn btn-outline-secondary" id="btnScaleDay">Dni</button>
        </div>
        <div class="btn-group w-100 mb-3">
            <button class="btn btn-sm btn-primary" id="btnShowFeedingChart">🍼 Posiłki</button>
            <button class="btn btn-sm btn-success" id="btnShowWeightChart">⚖️ Waga</button>
        </div>
        <div class="chart-container"><canvas id="myChart"></canvas></div>
    </div>

    <div id="settings" class="tab-content">
        <h5>⚙️ Zarządzaj Dziećmi</h5>
        <div class="card p-3 mb-3 shadow-sm">
            <input type="text" id="childName" class="form-control mb-2" placeholder="Imię">
            <input type="date" id="childBirth" class="form-control mb-2">
            <button id="btnAddChild" class="btn btn-dark w-100">Dodaj profil</button>
        </div>
        <div id="childrenList"></div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" data-tab="today">🏠 Dziś</div>
        <div class="nav-item" data-tab="meal">🍼 Jemy</div>
        <div class="nav-item" data-tab="poop">💩 Kupa</div>
        <div class="nav-item" data-tab="weight">⚖️ Waga</div>
        <div class="nav-item" data-tab="analytics">📈 Raport</div>
        <div class="nav-item" data-tab="settings">⚙️ Profil</div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="db.js"></script>
    <script src="charts.js"></script>
    <script src="app.js"></script>
</body>
</html>
